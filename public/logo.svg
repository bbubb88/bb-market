<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <!-- B 字母渐变 -->
    <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆形装饰 -->
  <circle cx="60" cy="60" r="45" fill="url(#logoGrad)" opacity="0.15"/>
  <circle cx="55" cy="55" r="30" fill="url(#logoGrad)" opacity="0.1"/>
  
  <!-- 闪电/货币符号 -->
  <path d="M55 25 L75 55 L65 55 L70 95 L50 60 L62 60 Z" 
        fill="url(#logoGrad)" 
        filter="url(#glow)"
        transform="translate(-5, 0)"/>
  
  <!-- B 字母 -->
  <text x="90" y="85" 
        font-family="Arial Black, Helvetica, sans-serif" 
        font-size="72" 
        font-weight="bold" 
        fill="url(#bGrad)">B</text>
  <text x="90" y="85" 
        font-family="Arial Black, Helvetica, sans-serif" 
        font-size="72" 
        font-weight="bold" 
        fill="url(#bGrad)" 
        opacity="0.3" 
        transform="translate(2, 2)"/>
  
  <!-- Market 文字 -->
  <text x="155" y="85" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="42" 
        font-weight="bold" 
        fill="#E2E8F0">Market</text>
  
  <!-- 底部横线 -->
  <rect x="90" y="95" width="200" height="3" rx="1.5" fill="url(#logoGrad)" opacity="0.6"/>
</svg>
