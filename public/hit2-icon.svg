<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  <!-- Inner glow -->
  <rect x="20" y="20" width="472" height="472" rx="90" fill="none" stroke="url(#textGrad)" stroke-width="3" opacity="0.3"/>
  <!-- H2 Text -->
  <text x="256" y="340" font-family="Arial Black, sans-serif" font-size="260" font-weight="bold" fill="url(#textGrad)" text-anchor="middle" filter="url(#shadow)">H2</text>
  <!-- Shine effect -->
  <ellipse cx="256" cy="180" rx="180" ry="80" fill="white" opacity="0.08"/>
</svg>
